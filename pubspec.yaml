name: dart2wgsl
description: A tool to transpile a restricted subset of Dart to WGSL (WebGPU Shading Language).
version: 0.1.0
homepage: https://github.com/sanjayc77/dart2wgsl
repository: https://github.com/sanjayc77/dart2wgsl

environment:
  sdk: ^3.12.0

dependencies:
  args: ^2.5.0
  meta: ^1.11.0
  analyzer: ^13.3.0
  build: ^4.0.6
  path: ^1.9.0
  vector_math: ^2.1.4

dev_dependencies:
  build_config: ^1.1.1
  build_runner: ^2.4.8
  lints: ^6.1.0
  test: ^1.25.0
