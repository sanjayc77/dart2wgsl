name: shadertoy
description: An example ShaderToy application rendering Dart-transpiled WGSL shaders.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_gpux: ^0.1.0
  gpux: ^0.1.0
  vector_math: ^2.1.4
  dart2wgsl:
    path: ../../

dev_dependencies:
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/shaders/toy.shader.dart
